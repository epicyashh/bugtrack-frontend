<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#6B46C1"/>
  <!-- Bug body (oval) -->
  <ellipse cx="16" cy="17" rx="6" ry="7.5" fill="white" opacity="0.95"/>
  <!-- Bug head -->
  <circle cx="16" cy="9.5" r="3.5" fill="white" opacity="0.95"/>
  <!-- Antenna left -->
  <line x1="13.5" y1="7" x2="10" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="10" cy="4" r="1" fill="white"/>
  <!-- Antenna right -->
  <line x1="18.5" y1="7" x2="22" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="4" r="1" fill="white"/>
  <!-- Legs left -->
  <line x1="10" y1="15" x2="7" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="18" x2="7" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="21" x2="7" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="22" y1="15" x2="25" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="18" x2="25" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="21" x2="25" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body stripe -->
  <line x1="16" y1="12" x2="16" y2="24" stroke="#6B46C1" stroke-width="1.2" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="14.2" cy="9.2" r="1" fill="#6B46C1"/>
  <circle cx="17.8" cy="9.2" r="1" fill="#6B46C1"/>
</svg>
